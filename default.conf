map $host $footer_email {
    default contato@investirimoveisemflorianopolis.com;
    juliobecker.com.br contato@juliobecker.com.br;
    www.juliobecker.com.br contato@juliobecker.com.br;
}

map $host $logo_file {
    default logo.png;
    juliobecker.com.br logo-juliobecker.png;
    www.juliobecker.com.br logo-juliobecker.png;
}

map $host $logo_h_desktop {
    default 104;
    juliobecker.com.br 160;
    www.juliobecker.com.br 160;
}

map $host $logo_h_mobile {
    default 74;
    juliobecker.com.br 110;
    www.juliobecker.com.br 110;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter 'contato@investirimoveisemflorianopolis.com' $footer_email;
    sub_filter '.brand .logo{height:104px' '.brand .logo{height:${logo_h_desktop}px';
    sub_filter '.brand .logo{height:74px}' '.brand .logo{height:${logo_h_mobile}px}';

    location = /logo.png {
        try_files /$logo_file =404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
