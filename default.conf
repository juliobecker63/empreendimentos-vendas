map $host $footer_email {
    default contato@investirimoveisemflorianopolis.com;
    juliobecker.com.br contato@juliobecker.com.br;
    www.juliobecker.com.br contato@juliobecker.com.br;
}

map $host $logo_file {
    default logo.png;
    juliobecker.com.br logo-juliobecker.png;
    www.juliobecker.com.br logo-juliobecker.png;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter 'contato@investirimoveisemflorianopolis.com' $footer_email;

    location = /logo.png {
        try_files /$logo_file =404;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
